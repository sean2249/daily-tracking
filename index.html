<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#d96f47" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Pixie" />
<link rel="icon" type="image/png" href="favicon-32.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Pixie — Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    /* warm cozy 16-bit palette */
    --bg:          #f0e2c0;  /* parchment */
    --bg-deep:     #e6d4a8;
    --ink:         #2a1d12;  /* near-black brown */
    --ink-soft:    #5d4632;
    --paper:       #fbf3df;
    --paper-deep:  #f5e9c8;

    --accent:      #d96f47;  /* terracotta */
    --accent-2:    #c95a32;
    --gold:        #e5a93a;  /* coin yellow */
    --leaf:        #6a9c4a;  /* plant green */
    --leaf-dark:   #3a6b2a;
    --sky:         #88c4d9;
    --rose:        #d97a8f;
    --lilac:       #9989c5;

    --hair:        #5c3a1e;
    --skin:        #f4c2a1;
    --skin-shade:  #d99c79;
    --shirt:       #5d8aa8;
    --shirt-shade: #3e6580;

    --wall:        #f4dca0;
    --wall-shade:  #d9b873;
    --floor:       #b87a48;
    --floor-dark:  #8b5a30;
    --bed:         #c95a55;
    --bed-shade:   #9a3e3a;
    --sheet:       #fbf3df;

    --line:        #c9b683;
    --line-strong: #8b6f3a;

    /* type */
    --font-display: 'Nunito', system-ui, sans-serif;
    --font-body:    'Nunito', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;

    /* safe-area insets (0 on desktop; real values on notched phones) */
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
    /* fake status-bar / header top paddings — desktop values; the phone
       media query below makes these safe-area driven */
    --status-pad: 52px;
    --header-pad: 54px;
    --auth-pad: 72px;
  }

  html, body {
    margin: 0; padding: 0;
    background: transparent;
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
    background: transparent;
  }
  * { box-sizing: border-box; }

  /* hide scrollbars (mobile-style) */
  ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
  * { scrollbar-width: none; }
  svg.pixel { shape-rendering: crispEdges; image-rendering: pixelated; display: block; }
  img.pixel { image-rendering: pixelated; }

  /* button — modern soft */
  .px-btn {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: var(--accent);
    color: #fff;
    border: 1.5px solid rgba(42,29,18,0.18);
    border-radius: 14px;
    box-shadow: 0 4px 12px rgba(42,29,18,0.10);
    padding: 12px 18px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  }
  .px-btn:hover  { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(42,29,18,0.14); }
  .px-btn:active { transform: translateY(0);    box-shadow: 0 2px 6px rgba(42,29,18,0.10); }
  .px-btn.ghost { background: var(--paper); color: var(--ink); }
  .px-btn.gold  { background: var(--gold);   color: var(--ink); }

  /* card */
  .px-card {
    background: var(--paper);
    border: 1.5px solid rgba(42,29,18,0.12);
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(42,29,18,0.08);
  }
  .px-card.soft { box-shadow: 0 3px 8px rgba(42,29,18,0.05); }

  /* ─────────────────────────────────────────────
     RWD — fullscreen phone on small viewports
     ───────────────────────────────────────────── */
  @media (max-width: 480px) {
    /* lock the document to the visible (dynamic) viewport so the page itself
       never scrolls/bounces — only the inner ScreenScroll list scrolls */
    html, body {
      height: 100dvh;
      overflow: hidden;
    }
    body {
      padding: 0 !important;
      padding-left: var(--sal) !important;
      padding-right: var(--sar) !important;
      background: var(--bg) !important;
      align-items: stretch !important;
      justify-content: stretch !important;
    }
    .phone-stage {
      width: 100% !important;
      height: 100dvh;
    }
    .phone-frame {
      /* 100% (not 100vw) so it never exceeds the safe visible width under
         viewport-fit=cover; 100dvh tracks the visible height */
      width: 100% !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    /* drive the fake status-bar / header paddings off the real notch inset */
    :root {
      --status-pad: calc(var(--sat) + 14px);
      --header-pad: calc(var(--sat) + 16px);
      --auth-pad: calc(var(--sat) + 28px);
    }
  }

  /* scanline overlay (subtle) */
  .scanlines::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.06) 0,
      rgba(0,0,0,0.06) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.35;
  }

  /* keyframes */
  @keyframes pop-in {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1);    opacity: 1; }
  }
  @keyframes sparkle {
    0%   { transform: scale(0) rotate(0deg);    opacity: 0; }
    40%  { transform: scale(1.2) rotate(45deg); opacity: 1; }
    100% { transform: scale(0) rotate(90deg);   opacity: 0; }
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-2px); }
    40%      { transform: translateX( 3px); }
    60%      { transform: translateX(-3px); }
    80%      { transform: translateX( 2px); }
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    96%           { transform: scaleY(0.1); }
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(900px) rotate(720deg); opacity: 0.2; }
  }
  @keyframes drop-in {
    0%   { transform: translateY(-20px) scale(0.92); opacity: 0; }
    100% { transform: translateY(0)     scale(1);    opacity: 1; }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 0 rgba(229,169,58,0); }
    50%      { box-shadow: 0 0 18px rgba(229,169,58,0.8); }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="module" src="/src/main.jsx"></script>

</body>
</html>
