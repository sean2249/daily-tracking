name: CI

# Merge gate: unit tests + production build run on every PR (and on main).
# The heavier Playwright jobs are manual (workflow_dispatch) — see CLAUDE.md.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Tier 1 — the automatic gate. Fast, deterministic, no secrets, no DB.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

  # Tier 2 — UI smoke (no login, no DB). Manual only.
  e2e-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke

  # Tier 3 — full live E2E against real Supabase. Manual only.
  # Self-skips unless the E2E_TEST_EMAIL / E2E_TEST_PASSWORD secrets are set
  # (a confirmed throwaway test account).
  e2e-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
